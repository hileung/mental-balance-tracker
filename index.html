<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mental Balance Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#e0e0e0;}
.container{max-width:600px;margin:0 auto;padding:20px;}
h1{text-align:center;font-size:1.8rem;margin:20px 0;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);border-radius:16px;padding:24px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.1);}
.card h2{font-size:1.1rem;margin-bottom:16px;color:#a78bfa;}
.mood-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;}
.mood-btn{padding:12px 4px;border:2px solid rgba(255,255,255,0.15);border-radius:12px;background:rgba(255,255,255,0.05);cursor:pointer;text-align:center;transition:all 0.3s;font-size:1.5rem;}
.mood-btn:hover{transform:scale(1.1);border-color:#a78bfa;}
.mood-btn.selected{border-color:#a78bfa;background:rgba(167,139,250,0.2);transform:scale(1.1);}
.mood-btn span{display:block;font-size:0.65rem;color:#aaa;margin-top:4px;}
.slider-group{margin-bottom:16px;}
.slider-group label{display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.9rem;}
.slider-group input[type=range]{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:rgba(255,255,255,0.15);outline:none;}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#a78bfa;cursor:pointer;}
textarea{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#e0e0e0;font-family:inherit;font-size:0.9rem;resize:vertical;min-height:80px;}
textarea::placeholder{color:#888;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#a78bfa,#60a5fa);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.3s;margin-top:12px;}
.btn:hover{opacity:0.9;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.history-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:rgba(255,255,255,0.04);margin-bottom:8px;}
.history-item .emoji{font-size:1.5rem;}
.history-item .details{flex:1;}
.history-item .details .date{font-size:0.75rem;color:#888;}
.history-item .details .note{font-size:0.85rem;margin-top:2px;color:#ccc;}
.history-item .scores{display:flex;gap:8px;font-size:0.7rem;}
.history-item .scores span{background:rgba(167,139,250,0.15);padding:2px 8px;border-radius:8px;}
.chart-container{position:relative;width:100%;height:200px;margin-top:8px;}
canvas{width:100%!important;height:100%!important;}
.empty{text-align:center;padding:20px;color:#666;font-size:0.9rem;}
.tabs{display:flex;gap:8px;margin-bottom:16px;}
.tab-btn{flex:1;padding:10px;border:1px solid rgba(255,255,255,0.15);border-radius:10px;background:rgba(255,255,255,0.05);color:#aaa;cursor:pointer;text-align:center;font-size:0.85rem;transition:all 0.3s;}
.tab-btn.active{background:rgba(167,139,250,0.2);border-color:#a78bfa;color:#fff;}
.clear-btn{background:rgba(255,80,80,0.15);border:1px solid rgba(255,80,80,0.3);color:#ff6b6b;font-size:0.8rem;padding:8px 16px;border-radius:8px;cursor:pointer;margin-top:12px;}
.clear-btn:hover{background:rgba(255,80,80,0.25);}
.streak{text-align:center;padding:10px;font-size:0.9rem;color:#60a5fa;}
</style>
</head>
<body>
<div class="container">
<h1>Mental Balance Tracker</h1>
<div class="card">
<h2>How are you feeling?</h2>
<div class="mood-grid">
<div class="mood-btn" data-mood="1" onclick="selectMood(this)">😞<span>Awful</span></div>
<div class="mood-btn" data-mood="2" onclick="selectMood(this)">😔<span>Low</span></div>
<div class="mood-btn" data-mood="3" onclick="selectMood(this)">😐<span>Okay</span></div>
<div class="mood-btn" data-mood="4" onclick="selectMood(this)">😊<span>Good</span></div>
<div class="mood-btn" data-mood="5" onclick="selectMood(this)">😄<span>Great</span></div>
</div>
<div class="slider-group">
<label>Energy Level <span id="energyVal">5</span>/10</label>
<input type="range" id="energy" min="1" max="10" value="5" oninput="document.getElementById('energyVal').textContent=this.value">
</div>
<div class="slider-group">
<label>Stress Level <span id="stressVal">5</span>/10</label>
<input type="range" id="stress" min="1" max="10" value="5" oninput="document.getElementById('stressVal').textContent=this.value">
</div>
<div class="slider-group">
<label>Sleep Quality <span id="sleepVal">5</span>/10</label>
<input type="range" id="sleep" min="1" max="10" value="5" oninput="document.getElementById('sleepVal').textContent=this.value">
</div>
<textarea id="notes" placeholder="Any thoughts or reflections? (optional)"></textarea>
<button class="btn" onclick="saveEntry()">Save Entry</button>
</div>
<div id="streakBox" class="streak"></div>
<div class="card">
<h2>Your Journey</h2>
<div class="tabs">
<button class="tab-btn active" onclick="switchTab('history',this)">History</button>
<button class="tab-btn" onclick="switchTab('chart',this)">Trends</button>
</div>
<div id="historyTab"><div id="historyList" class="empty">No entries yet. Start tracking!</div></div>
<div id="chartTab" style="display:none"><div class="chart-container"><canvas id="trendChart"></canvas></div></div>
<button class="clear-btn" onclick="clearAll()" style="display:none" id="clearBtn">Clear All Data</button>
</div>
</div>
<script>
let selectedMood=null;
const moods=['','😞','😔','😐','😊','😄'];
const moodLabels=['','Awful','Low','Okay','Good','Great'];
function selectMood(el){document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');selectedMood=parseInt(el.dataset.mood);}
function getEntries(){return JSON.parse(localStorage.getItem('mbt_entries')||'[]');}
function saveEntries(e){localStorage.setItem('mbt_entries',JSON.stringify(e));}
function saveEntry(){
if(!selectedMood){alert('Please select a mood first!');return;}
const entry={id:Date.now(),date:new Date().toISOString(),mood:selectedMood,energy:parseInt(document.getElementById('energy').value),stress:parseInt(document.getElementById('stress').value),sleep:parseInt(document.getElementById('sleep').value),notes:document.getElementById('notes').value.trim()};
const entries=getEntries();entries.unshift(entry);saveEntries(entries);
document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));selectedMood=null;
document.getElementById('energy').value=5;document.getElementById('energyVal').textContent='5';
document.getElementById('stress').value=5;document.getElementById('stressVal').textContent='5';
document.getElementById('sleep').value=5;document.getElementById('sleepVal').textContent='5';
document.getElementById('notes').value='';
render();showToast('Entry saved!');
}
function showToast(msg){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#a78bfa;color:#fff;padding:12px 24px;border-radius:12px;font-size:0.9rem;z-index:999;animation:fadeIn 0.3s';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}
function render(){
const entries=getEntries();const list=document.getElementById('historyList');const clearBtn=document.getElementById('clearBtn');
if(entries.length===0){list.innerHTML='<div class="empty">No entries yet. Start tracking!</div>';list.className='empty';clearBtn.style.display='none';updateStreak(entries);return;}
clearBtn.style.display='block';list.className='';
let html='';entries.slice(0,20).forEach(e=>{
const d=new Date(e.date);const dateStr=d.toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
html+='<div class="history-item"><div class="emoji">'+moods[e.mood]+'</div><div class="details"><div class="date">'+dateStr+'</div>';
if(e.notes)html+='<div class="note">'+e.notes.substring(0,60)+(e.notes.length>60?'...':'')+'</div>';
html+='</div><div class="scores"><span>E:'+e.energy+'</span><span>S:'+e.stress+'</span><span>Z:'+e.sleep+'</span></div></div>';});
list.innerHTML=html;updateStreak(entries);drawChart(entries);
}
function updateStreak(entries){
const box=document.getElementById('streakBox');
if(entries.length===0){box.textContent='';return;}
let streak=1;const today=new Date().toDateString();
const days=[...new Set(entries.map(e=>new Date(e.date).toDateString()))];
if(days[0]!==today){box.textContent='Log today to keep your streak!';return;}
for(let i=1;i<days.length;i++){const d1=new Date(days[i-1]);const d2=new Date(days[i]);const diff=(d1-d2)/(1000*60*60*24);if(diff<=1)streak++;else break;}
box.textContent=streak+' day'+(streak>1?'s':'')+' streak! Keep going!';
}
function switchTab(tab,btn){
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
document.getElementById('historyTab').style.display=tab==='history'?'block':'none';
document.getElementById('chartTab').style.display=tab==='chart'?'block':'none';
if(tab==='chart')drawChart(getEntries());
}
function drawChart(entries){
const canvas=document.getElementById('trendChart');if(!canvas)return;const ctx=canvas.getContext('2d');
const data=entries.slice(0,14).reverse();if(data.length<2)return;
canvas.width=canvas.parentElement.offsetWidth;canvas.height=200;
const w=canvas.width,h=canvas.height,pad=30,gw=w-pad*2,gh=h-pad*2;
ctx.clearRect(0,0,w,h);
const lines=[{key:'mood',color:'#a78bfa',max:5},{key:'energy',color:'#60a5fa',max:10},{key:'sleep',color:'#34d399',max:10}];
lines.forEach(line=>{
ctx.beginPath();ctx.strokeStyle=line.color;ctx.lineWidth=2;
data.forEach((e,i)=>{
const x=pad+i*(gw/(data.length-1));const y=pad+gh-(e[line.key]/line.max)*gh;
i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
ctx.stroke();});
ctx.fillStyle='#666';ctx.font='10px sans-serif';ctx.textAlign='center';
data.forEach((e,i)=>{const x=pad+i*(gw/(data.length-1));const d=new Date(e.date);ctx.fillText((d.getMonth()+1)+'/'+d.getDate(),x,h-5);});
ctx.textAlign='left';ctx.font='9px sans-serif';
ctx.fillStyle='#a78bfa';ctx.fillText('Mood',5,15);
ctx.fillStyle='#60a5fa';ctx.fillText('Energy',45,15);
ctx.fillStyle='#34d399';ctx.fillText('Sleep',95,15);
}
function clearAll(){if(confirm('Delete all entries?')){localStorage.removeItem('mbt_entries');render();}}
render();
</script>
</body>
</html>
