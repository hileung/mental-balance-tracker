<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mental Balance Tracker v3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- You can keep all your existing <style> here -->
  <style>
    /* PASTE YOUR FULL v3 CSS HERE */
  </style>
</head>
<body>
  <!-- Optional: simple top bar to make it feel like an app shell -->
  <header style="
    position: sticky;
    top: 0;
    z-index: 20;
    padding: 8px 12px;
    background: rgba(3,7,18,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(148,163,184,0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    color: #e5e7eb;
    font-size: 13px;
  ">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="
        width:10px;height:10px;border-radius:999px;
        background:linear-gradient(135deg,#22c55e,#4ade80);
        box-shadow:0 0 0 4px rgba(34,197,94,0.3);
      "></span>
      <span>Mental Balance Tracker v3</span>
    </div>
    <span id="top-date"></span>
  </header>

  <!-- Your original main content -->
  <!-- PASTE V3 HERE (everything from your existing <main class="app-shell"> to </main>) -->

  <script>
    // Set today’s date automatically in both the top bar and the in‑app chip
    function formatToday() {
      const d = new Date();
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const today = formatToday();
      // top bar
      const topDate = document.getElementById("top-date");
      if (topDate) topDate.textContent = today;

      // in‑app chip (your template uses "YYYY-MM-DD")
      const dateChips = Array.from(document.querySelectorAll(".date-value"));
      dateChips.forEach(el => el.textContent = today);

      // make “editable chips” actually editable
      document.querySelectorAll(".input-chip--editable").forEach(chip => {
        chip.addEventListener("click", () => {
          const valueSpan = chip.querySelector(".input-chip-value");
          if (!valueSpan) return;
          const current = valueSpan.textContent || "";
          const next = prompt("Update this field:", current);
          if (next !== null) valueSpan.textContent = next;
        });
      });
    });
  </script>
</body>
</html>
